app-id: io.github.nestorchurin.MineImator
runtime: org.kde.Platform
runtime-version: "5.15-25.08"
sdk: org.kde.Sdk
command: mine-imator

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home

modules:
  - name: mine-imator
    buildsystem: simple
    build-commands:
      - cmake -S CppProject -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DUSE_SYSTEM_LIBS=ON
      - cmake --build build --parallel
      - install -Dm755 build/Mine-imator /app/bin/Mine-imator
      - install -Dm755 flatpak/mine-imator.sh /app/bin/mine-imator
      - install -Dm644 flatpak/io.github.nestorchurin.MineImator.desktop /app/share/applications/io.github.nestorchurin.MineImator.desktop
      - install -Dm644 flatpak/io.github.nestorchurin.MineImator.metainfo.xml /app/share/metainfo/io.github.nestorchurin.MineImator.metainfo.xml
      - install -Dm644 Installer/Linux/Mine-imator/usr/share/pixmaps/mine-imator.png /app/share/icons/hicolor/256x256/apps/io.github.nestorchurin.MineImator.png
      - install -Dm644 Installer/Windows/license.txt /app/share/licenses/io.github.nestorchurin.MineImator/upstream/LICENSE
    sources:
      - type: dir
        path: ..
        skip:
          - .git
          - .flatpak-builder
          - build-flatpak
          - build-host
