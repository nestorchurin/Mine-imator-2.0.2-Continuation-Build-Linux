app-id: com.nestor_churin.MineImator
runtime: org.kde.Platform
runtime-version: "5.15-25.08"
sdk: org.kde.Sdk
command: mine-imator

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=xdg-documents:rw
  - --filesystem=xdg-download:rw

modules:
  - name: mine-imator
    buildsystem: simple
    build-commands:
      - cmake -S CppProject -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DUSE_SYSTEM_LIBS=ON
      - cmake --build build --parallel
      - install -Dm755 build/Mine-imator /app/bin/Mine-imator
      - install -Dm755 flatpak/mine-imator.sh /app/bin/mine-imator
      - install -Dm644 flatpak/com.nestor_churin.MineImator.desktop /app/share/applications/com.nestor_churin.MineImator.desktop
      - install -Dm644 flatpak/com.nestor_churin.MineImator.metainfo.xml /app/share/metainfo/com.nestor_churin.MineImator.metainfo.xml
      - install -Dm644 Installer/Linux/Mine-imator/usr/share/pixmaps/mine-imator.png /app/share/icons/hicolor/256x256/apps/com.nestor_churin.MineImator.png
      - install -Dm644 Installer/Windows/license.txt /app/share/licenses/com.nestor_churin.MineImator/upstream/LICENSE
    sources:
      - type: git
        url: https://github.com/nestorchurin/Mine-imator-2.0.2-Continuation-Build.git
        commit: 62bdaaf3c86af343ab827ed16c080a82e2782f91